services:
  hermes-agent:
    image: 'nousresearch/hermes-agent:latest'
    command: 'gateway run'
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_UID=1000
      - HERMES_GID=1000
      - 'TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}'
      - 'TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}'
      - 'TELEGRAM_WEBHOOK_SECRET=${SERVICE_HEX_32_TELEGRAM}'
      - 'TELEGRAM_REACTIONS=${TELEGRAM_REACTIONS:-true}'
      - 'GLM_API_KEY=${GLM_API_KEY}'
      - 'GLM_BASE_URL=${GLM_BASE_URL:-https://api.z.ai/api/coding/paas/v4}'
    volumes:
      - 'hermes-home:/home/hermes/.hermes'
      - 'hermes-agent-src:/opt/hermes'
    healthcheck:
      test:
        - CMD-SHELL
        - 'test -d /home/hermes/.hermes || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
  hermes-webui:
    image: 'ghcr.io/nesquena/hermes-webui:latest'
    depends_on:
      - hermes-agent
    environment:
      - SERVICE_URL_HERMESWEBUI_8787
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - WANTED_UID=1000
      - WANTED_GID=1000
      - 'HERMES_WEBUI_PASSWORD=${SERVICE_PASSWORD_HERMESWEBUI}'
    volumes:
      - 'hermes-home:/home/hermeswebui/.hermes'
      - 'hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent:ro'
      - 'hermes-workspace:/workspace'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:8787/health'
      interval: 30s
      timeout: 5s
      retries: 3
