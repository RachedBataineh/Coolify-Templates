services:
  rustfs:
    image: 'rustfs/rustfs:latest'
    container_name: rustfs-server
    security_opt:
      - 'no-new-privileges:true'
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - 'RUSTFS_VOLUMES=/data/rustfs{0..3}'
      - 'RUSTFS_ADDRESS=0.0.0.0:9000'
      - 'RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001'
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=$SERVICE_USER_RUSTFS
      - RUSTFS_SECRET_KEY=$SERVICE_PASSWORD_RUSTFS
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_REGION=eu-west-1
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=$SERVICE_URL_RUSTFS_9001
      - RUSTFS_CORS_ALLOWED_ORIGINS=$SERVICE_URL_RUSTFS_9000
      - RUSTFS_UNSAFE_BYPASS_DISK_CHECK=true
    volumes:
      - 'rustfs_data:/data'
      - 'rustfs_logs:/app/logs'
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - sh
        - '-c'
        - 'curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
volumes:
  rustfs_data:
    driver: local
  rustfs_logs:
    driver: local
