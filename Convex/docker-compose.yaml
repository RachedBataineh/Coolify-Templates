services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: always
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - '3210:3210'
      - '3211:3211'

    environment:
      # Identity — must be identical on both nodes
      - INSTANCE_NAME=${INSTANCE_NAME:-convex}
      - INSTANCE_SECRET=${SERVICE_HEX_64_SECRET}

      # Origins — domains for the backend and site (HTTP), respectively
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN}

      # SSL — Traefik/Nginx handles it
      - DO_NOT_REQUIRE_SSL=${DO_NOT_REQUIRE_SSL:-1}

      # PostgreSQL — points to shared DB
      - POSTGRES_URL=${POSTGRES_URL:-?sslmode=disable}

      # S3 — shared object storage
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - AWS_S3_FORCE_PATH_STYLE=true
      - AWS_S3_DISABLE_CHECKSUMS=true
      - AWS_S3_DISABLE_SSE=true
      - S3_STORAGE_FILES_BUCKET=${S3_STORAGE_FILES_BUCKET}
      - S3_STORAGE_MODULES_BUCKET=${S3_STORAGE_MODULES_BUCKET}
      - S3_STORAGE_SEARCH_BUCKET=${S3_STORAGE_SEARCH_BUCKET}
      - S3_STORAGE_EXPORTS_BUCKET=${S3_STORAGE_EXPORTS_BUCKET}
      - S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET=${S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET}

      # Concurrency
      - APPLICATION_MAX_CONCURRENT_MUTATIONS=${APPLICATION_MAX_CONCURRENT_MUTATIONS:-16}
      - APPLICATION_MAX_CONCURRENT_NODE_ACTIONS=${APPLICATION_MAX_CONCURRENT_NODE_ACTIONS:-16}
      - APPLICATION_MAX_CONCURRENT_QUERIES=${APPLICATION_MAX_CONCURRENT_QUERIES:-16}
      - APPLICATION_MAX_CONCURRENT_V8_ACTIONS=${APPLICATION_MAX_CONCURRENT_V8_ACTIONS:-16}

      # Misc
      - ACTIONS_USER_TIMEOUT_SECS=${ACTIONS_USER_TIMEOUT_SECS:-600}
      - DISABLE_BEACON=true
      - DISABLE_METRICS_ENDPOINT=true
      - DOCUMENT_RETENTION_DELAY=${DOCUMENT_RETENTION_DELAY:-604800}
      - HTTP_SERVER_TIMEOUT_SECONDS=${HTTP_SERVER_TIMEOUT_SECONDS:-300}
      - REDACT_LOGS_TO_CLIENT=${REDACT_LOGS_TO_CLIENT:-true}
      - RUST_LOG=${RUST_LOG:-info}

    # No volumes — all state lives in PostgreSQL and S3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    # Set your domain in Coolify UI → Service → dashboard → Port: 6791
    environment:
      # Must point to the public URL of the backend service
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN}
      - NEXT_PUBLIC_LOAD_MONACO_INTERNALLY=${NEXT_PUBLIC_LOAD_MONACO_INTERNALLY:-}
